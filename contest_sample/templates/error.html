{% extends 'base.html' %}

{% block title %}Error - AI Recommendation System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <h1 class="display-1 text-danger">{{ code }}</h1>
        <h2 class="mb-4">{{ message }}</h2>
        <p class="lead mb-4">We encountered an error while processing your request.</p>
        <a href="/" class="btn btn-primary btn-lg">
            <i class="bi bi-house"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
